services:
  postgres:
    image: postgres:15-alpine
    container_name: archery_counter_db
    environment:
      POSTGRES_DB: postgres 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  annotate:
    build:
      context: .
      dockerfile: Dockerfile.annotate
    container_name: archery_annotate
    ports:
      - "3737:3737"
    volumes:
      - ./images:/app/images
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      NO_BROWSER: 1
    depends_on:
      postgres:
        condition: service_healthy