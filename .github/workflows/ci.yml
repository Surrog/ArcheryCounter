name: CI

on:
  push:
  pull_request:

jobs:
  # ── React Native: Jest unit + algorithm tests ────────────────────────────────
  react-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --ci --testTimeout=120000

  # ── Android: debug build ─────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Assemble debug APK
        run: |
          cd android
          ./gradlew :app:assembleDebug --no-daemon

  # ── iOS: build for simulator ─────────────────────────────────────────────────
  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build for simulator
        run: |
          xcodebuild \
            -workspace ios/ArcheryCounter.xcworkspace \
            -scheme ArcheryCounter \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
