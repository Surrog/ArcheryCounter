name: CI

on:
  push:
  pull_request:

jobs:
  # ── Linux: static analysis + build + tests ──────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libopencv-dev clang-tools

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: |
          mkdir native/build && cd native/build
          cmake ..

      - name: Build with scan-build
        env:
          CC: clang
          CXX: clang++
        run: |
          cd native/build
          scan-build cmake --build . -- -j2

      - name: Run tests
        run: |
          cd native/build
          ctest --output-on-failure

  # ── Windows: build only ──────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCV
        run: choco install opencv --params="'/Environment'" -y

      - name: Build
        shell: cmd
        run: |
          refreshenv
          mkdir native\build
          cd native\build
          cmake .. -G "Visual Studio 17 2022"
          cmake --build . --config Release

      - name: Run tests
        shell: cmd
        run: |
          cd native\build
          ctest -C Release --output-on-failure
