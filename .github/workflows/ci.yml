name: CI

on:
  push:

permissions:
  contents: read

jobs:
  # ── React Native: Jest unit + algorithm tests ────────────────────────────────
  react-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U postgres && break
            sleep 1
          done

      - name: Seed DB from parquet
        run: npm run seed-from-parquet
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: postgres

      - name: Run Jest with coverage
        run: npm run test:coverage -- --ci --testTimeout=120000
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: postgres

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

  # ── Python: NN ground-truth tests ────────────────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node (for DB seeding)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U postgres && break
            sleep 1
          done

      - name: Seed DB from parquet
        run: npm run seed-from-parquet
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: postgres

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python test dependencies
        run: uv sync --group test

      - name: Run Python tests
        run: uv run pytest tests/ -v
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: postgres

  # ── Android: debug build ─────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Assemble debug APK
        run: |
          cd android
          ./gradlew :app:assembleDebug --no-daemon

  # ── iOS: build for simulator ─────────────────────────────────────────────────
  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build for simulator
        run: |
          xcodebuild \
            -workspace ios/ArcheryCounter.xcworkspace \
            -scheme ArcheryCounter \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
